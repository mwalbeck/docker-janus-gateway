name: Build and publish

on:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: docker
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: https://github.com/hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile

  build:
    runs-on: dind
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get docker tags - Docker Hub
        id: dockerhub_tags
        shell: sh
        env:
          VERSION_TYPE: "docker_env"
          APP_NAME: "JANUS"
          DOCKERFILE_PATH: "Dockerfile"
          CUSTOM_TAGS: "latest"
          INCLUDE_SUFFIX: "no"
          IMAGE_NAME: "mwalbeck/janus-gateway"
        run: |
          determine-docker-tags

      - name: Get docker tags - Forgejo
        id: forgejo_tags
        shell: sh
        env:
          VERSION_TYPE: "docker_env"
          APP_NAME: "JANUS"
          DOCKERFILE_PATH: "Dockerfile"
          CUSTOM_TAGS: "latest"
          INCLUDE_SUFFIX: "no"
          IMAGE_NAME: "git.walbeck.it/walbeck-it/janus-gateway"
        run: |
          determine-docker-tags
          dockerd &

      - name: Login to Docker Hub
        uses: https://github.com/docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to forgejo container registry
        uses: https://github.com/docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: git.walbeck.it
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      - name: Set up Docker Buildx
        uses: https://github.com/docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Build and push
        uses: https://github.com/docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.dockerhub_tags.outputs.tags }}
            ${{ steps.forgejo_tags.outputs.tags }}